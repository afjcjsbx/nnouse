name: Release

on:
  release:
    types:
      - published

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  build-and-upload:
    name: Build and attach release assets
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Xcode environment
        run: |
          xcode-select -p
          xcodebuild -version

      - name: Build Release app
        run: |
          xcodebuild \
            -project nnouse.xcodeproj \
            -scheme nnouse \
            -configuration Release \
            -derivedDataPath .build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package release assets
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail

          APP_ZIP="nnouse-${TAG}.app.zip"
          DSYM_DIR=".build/Build/Products/Release/nnouse.app.dSYM"
          DSYM_ZIP="nnouse-${TAG}.dSYM.zip"

          ditto -c -k --sequesterRsrc --keepParent \
            .build/Build/Products/Release/nnouse.app \
            "$APP_ZIP"

          assets=("$APP_ZIP")

          if [ -d "$DSYM_DIR" ]; then
            ditto -c -k --sequesterRsrc --keepParent \
              "$DSYM_DIR" \
              "$DSYM_ZIP"
            assets+=("$DSYM_ZIP")
          fi

          shasum -a 256 "${assets[@]}" > SHA256SUMS.txt

      - name: Upload release artifacts to workflow run
        uses: actions/upload-artifact@v4
        with:
          name: nnouse-release-assets
          path: |
            nnouse-${{ github.event.release.tag_name }}.app.zip
            nnouse-${{ github.event.release.tag_name }}.dSYM.zip
            SHA256SUMS.txt
          if-no-files-found: ignore

      - name: Attach assets to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail

          assets=("nnouse-${TAG}.app.zip" "SHA256SUMS.txt")
          if [ -f "nnouse-${TAG}.dSYM.zip" ]; then
            assets+=("nnouse-${TAG}.dSYM.zip")
          fi

          gh release upload "$TAG" "${assets[@]}" --clobber
